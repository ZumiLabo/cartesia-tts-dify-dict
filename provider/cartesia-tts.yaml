provider: cartesia-tts
author: zumilabo
label:
  en_US: Cartesia TTS
  ja_JP: Cartesia TTS
  zh_Hans: Cartesia TTS
description:
  en_US: Text-to-speech models provided by Cartesia.
  ja_JP: Cartesia が提供するテキスト読み上げモデルです。
  zh_Hans: Cartesia 提供的文本转语音模型。
background: "#E5E7EB"
help:
  title:
    en_US: Get your API Key from Cartesia
    ja_JP: Cartesia で API Key を取得
    zh_Hans: 从 Cartesia 获取 API Key
  url:
    en_US: https://play.cartesia.ai/
    ja_JP: https://play.cartesia.ai/
    zh_Hans: https://play.cartesia.ai/
supported_model_types:
  - tts
configurate_methods:
  - predefined-model
  - customizable-model
model_credential_schema:
  model:
    label:
      en_US: Model Name
      ja_JP: モデル名
      zh_Hans: 模型名称
    placeholder:
      en_US: Enter model name such as sonic-3
      ja_JP: sonic-3 などのモデル名を入力
      zh_Hans: 输入模型名称，例如 sonic-3
  credential_form_schemas:
    - variable: cartesia_api_key
      label:
        en_US: API Key
        ja_JP: APIキー
        zh_Hans: API Key
      type: secret-input
      required: true
      placeholder:
        en_US: Enter your API Key
        ja_JP: APIキーを入力
        zh_Hans: 在此输入您的 API Key
    - variable: voice_id
      label:
        en_US: Voice ID
        ja_JP: Voice ID
        zh_Hans: 语音 ID
      type: text-input
      required: true
      placeholder:
        en_US: Enter your Voice ID
        ja_JP: Voice ID を入力
        zh_Hans: 在此输入您的语音 ID
    - variable: pronunciation_dict_id
      label:
        en_US: Pronunciation Dictionary ID
        ja_JP: 発音辞書ID
        zh_Hans: 发音词典 ID
      type: text-input
      required: false
      placeholder:
        en_US: Optional Dictionary ID
        ja_JP: 任意。Dictionary ID を入力
        zh_Hans: 可选。输入 Dictionary ID
provider_credential_schema:
  credential_form_schemas:
    - variable: cartesia_api_key
      label:
        en_US: API Key
        ja_JP: APIキー
        zh_Hans: API Key
      type: secret-input
      required: true
      placeholder:
        en_US: Enter your API Key
        ja_JP: APIキーを入力
        zh_Hans: 在此输入您的 API Key
    - variable: voice_id
      label:
        en_US: Voice ID
        ja_JP: Voice ID
        zh_Hans: 语音 ID
      type: text-input
      required: true
      placeholder:
        en_US: Enter your Voice ID
        ja_JP: Voice ID を入力
        zh_Hans: 在此输入您的语音 ID
    - variable: pronunciation_dict_id
      label:
        en_US: Pronunciation Dictionary ID
        ja_JP: 発音辞書ID
        zh_Hans: 发音词典 ID
      type: text-input
      required: false
      placeholder:
        en_US: Optional Dictionary ID
        ja_JP: 任意。Dictionary ID を入力
        zh_Hans: 可选。输入 Dictionary ID
models:
  tts:
    predefined:
      - "models/tts/*.yaml"
extra:
  python:
    provider_source: provider/cartesia-tts.py
    model_sources:
      - "models/tts/tts.py"
